const bgVideo = document.getElementById("bg-video");
const player = new Vimeo.Player(bgVideo);

const VIDEO_INTERVAL = 150000; // 2,5 min
const VIDEO_DURATION = 22000; // 22 sec

function playBackgroundVideo() {
  player.setCurrentTime(0).then(() => {
    bgVideo.style.opacity = "1";  // fade-in
    player.play();

    setTimeout(() => {
      player.pause();
      bgVideo.style.opacity = "0"; // fade-out
    }, VIDEO_DURATION);
  });
}

// Eerste keer starten
playBackgroundVideo();

// Herhalen elke VIDEO_INTERVAL
setInterval(playBackgroundVideo, VIDEO_INTERVAL);
</script>
